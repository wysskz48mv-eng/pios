name: Autonomous Self-Healing Agents

# RUN EVERY 6 HOURS (automatically, no human needed)
on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  deployment:
  workflow_dispatch: {}

jobs:
  env-watcher:
    name: EnvWatcher
    runs-on: ubuntu-latest
    steps:
      - name: Run EnvWatcher Agent
        run: |
          echo "🤖 Running EnvWatcher..."
          response=$(curl -sf -w "\n%{http_code}" \
            -X POST "https://vfvfulbcaurqkygjrrhh.supabase.co/functions/v1/env-watcher" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "$body" | jq . 2>/dev/null || echo "$body"
          if [ "$http_code" -ge 500 ]; then
            echo "::error::EnvWatcher agent failed with status $http_code"
            exit 1
          fi
          echo "::notice::EnvWatcher completed (status $http_code)"

  auth-flow-tester:
    name: AuthFlowTester
    runs-on: ubuntu-latest
    steps:
      - name: Run AuthFlowTester Agent
        run: |
          echo "🤖 Running AuthFlowTester..."
          response=$(curl -sf -w "\n%{http_code}" \
            -X POST "https://vfvfulbcaurqkygjrrhh.supabase.co/functions/v1/auth-flow-tester" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "$body" | jq . 2>/dev/null || echo "$body"
          if [ "$http_code" -ge 500 ]; then
            echo "::error::AuthFlowTester agent failed"
            exit 1
          fi
          echo "::notice::AuthFlowTester completed (status $http_code)"

  health-check-healer:
    name: HealthCheckHealer
    runs-on: ubuntu-latest
    steps:
      - name: Run HealthCheckHealer Agent
        run: |
          echo "🤖 Running HealthCheckHealer..."
          response=$(curl -sf -w "\n%{http_code}" \
            -X POST "https://vfvfulbcaurqkygjrrhh.supabase.co/functions/v1/health-check-healer" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "$body" | jq . 2>/dev/null || echo "$body"
          echo "::notice::HealthCheckHealer completed (status $http_code)"

  # Run deep diagnostics via Vercel after edge functions complete
  deep-diagnostics:
    name: Deep Diagnostics
    runs-on: ubuntu-latest
    needs: [env-watcher, auth-flow-tester, health-check-healer]
    if: always()
    steps:
      - name: Run PIOS Diagnostics Engine
        run: |
          echo "🔍 Running deep diagnostics..."
          curl -sf \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "x-trigger: github_actions" \
            "${{ secrets.PIOS_APP_URL }}/api/cron/diagnostics" \
            | jq . 2>/dev/null || echo "Diagnostics endpoint not ready"

  # Post-deployment validation (runs on deploy events)
  post-deployment-validation:
    name: Post-Deploy Validation
    if: github.event_name == 'deployment'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Validate Auth Flow
        run: |
          curl -sf -X POST \
            "https://vfvfulbcaurqkygjrrhh.supabase.co/functions/v1/auth-flow-tester" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            | jq .

      - name: Check Database Health
        run: |
          curl -sf -X POST \
            "https://vfvfulbcaurqkygjrrhh.supabase.co/functions/v1/health-check-healer" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            | jq .
